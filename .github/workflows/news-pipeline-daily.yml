# Minimal news pipeline: ingest + draft only (no API keys required).
# Runs daily. Use newsroom-automation.yml for full pipeline (search, rewrite, reports).
name: News Pipeline (Daily – Ingest + Draft)

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

concurrency:
  group: news-pipeline-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest-and-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run news pipeline (ingest + draft)
        run: npm run news:pipeline

      - name: Commit and push new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news-articles data/news-ingest-log.json data/news-queue.json
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "Newsroom: auto-generated articles $(date -u +%Y-%m-%d)"
            git push
          fi
