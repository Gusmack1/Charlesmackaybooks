[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS = "--include=dev"

# SSL Configuration - Let Netlify handle SSL certificates automatically
[context.production.environment]
  NODE_ENV = "production"

# Enable Next.js Runtime
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Image serving handled by Next.js - no redirects needed

# SSL Configuration - Let Netlify handle SSL automatically

# ---------------------------------------------------------------------------
# NOTE: 410 Gone for ghost routes is now handled by src/middleware.ts.
# netlify.toml [[redirects]] are bypassed by @netlify/plugin-nextjs for any
# path the Next runtime claims (failure-mode logged in claude_brain). Same
# reason the [[headers]] for = "/*" security block was moved into
# next.config.js headers() — only static-asset / non-Next routes remain here.
# ---------------------------------------------------------------------------

[[headers]]
  for = "/book-covers/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/blog-images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for feeds and sitemaps (1h to track price refresh cadence)
[[headers]]
  for = "/products.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/merchant-feed.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/shopping-actions.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# Prevent stale CDN cache on checkout pages (fixes 404 from cached prerender)
[[headers]]
  for = "/checkout"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/checkout/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"

# Next.js static assets use content-hashed filenames — cache forever
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
