[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS = "--include=dev"

# SSL Configuration - Let Netlify handle SSL certificates automatically
[context.production.environment]
  NODE_ENV = "production"

# Enable Next.js Runtime
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Image serving handled by Next.js - no redirects needed

# SSL Configuration - Let Netlify handle SSL automatically

# ---------------------------------------------------------------------------
# 410 Gone — ghost routes removed in #811. Per Audit B §14 / V2 #4:
# 308-to-/ leaks PageRank to root and pollutes the index. 410 tells Google
# to drop these URLs entirely.
# ---------------------------------------------------------------------------

[[redirects]]
  from = "/blog"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/aviation-news"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/aviation-news/*"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/aviation-bibliography"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/aviation-glossary"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/research-guides"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/scottish-aviation-timeline"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/golden-age-1918-1939"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/great-war-1914-1918"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/pioneer-era-1895-1914"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/for-researchers"
  to = "/410"
  status = 410
  force = true

[[redirects]]
  from = "/categories"
  to = "/410"
  status = 410
  force = true

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=600, stale-while-revalidate=86400"
    Vary = "Accept-Encoding"

# ---------------------------------------------------------------------------
# Security headers — V2 #6 (Audit A §7).
# CSP shipped in REPORT-ONLY mode for first 24h per R4 staging plan; flip to
# enforce in a follow-up bd issue after reviewing violation reports.
# Allow-list rationale: Stripe Checkout (js.stripe.com / checkout.stripe.com /
# api.stripe.com / hooks.stripe.com), Supabase (*.supabase.co — covers site
# project iakuafpxuicisqbtmjbf per #818), Resend (api.resend.com), GA post-
# consent (googletagmanager.com / google-analytics.com), Google Fonts.
# ---------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(self \"https://checkout.stripe.com\")"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://checkout.stripe.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.charlesmackaybooks.com https://www.googletagmanager.com https://www.google-analytics.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com https://*.supabase.co https://api.resend.com https://www.googletagmanager.com https://www.google-analytics.com; frame-src 'self' https://js.stripe.com https://checkout.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/book-covers/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/blog-images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for feeds and sitemaps (1h to track price refresh cadence)
[[headers]]
  for = "/products.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/merchant-feed.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/shopping-actions.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# Prevent stale CDN cache on checkout pages (fixes 404 from cached prerender)
[[headers]]
  for = "/checkout"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/checkout/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"

# Next.js static assets use content-hashed filenames — cache forever
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
